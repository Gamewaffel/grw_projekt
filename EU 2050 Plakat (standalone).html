  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f706ea76-05aa-425b-836d-5815aa87b08b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* ============================================================\n   EUROPA 2050 — Almanach-Plakat\n   A3 Querformat · helle, organische, illustrierte Gestaltung\n   ============================================================ */\n:root{\n  --paper:        #f4e8cf;   /* warmes Cremepapier */\n  --paper-2:      #ecdcb8;\n  --paper-edge:   #e3cf9e;\n  --ink:          #2c2a1e;   /* warmes Dunkelbraun statt schwarz */\n  --ink-soft:     #54513e;\n  --gold:         #c9982b;\n  --gold-deep:    #a3771b;\n\n  /* Themenfarben — warm, gedeckt */\n  --c-politik:        #4a6f9a;   /* gedämpftes Blau */\n  --c-politik-d:      #2f4f73;\n  --c-gesellschaft:   #c9583f;   /* Terrakotta */\n  --c-gesellschaft-d: #9c3f2a;\n  --c-wirtschaft:     #b9882a;   /* Senf/Ocker */\n  --c-wirtschaft-d:   #8a6217;\n  --c-herausford:     #4f7a47;   /* Salbeigrün */\n  --c-herausford-d:   #34562f;\n  --c-bewertung:      #7a4a6b;   /* Pflaume */\n  --c-bewertung-d:    #5a3450;\n\n  --f-display:  \"Cormorant Garamond\", \"Times New Roman\", serif;\n  --f-body:     \"DM Sans\", system-ui, sans-serif;\n  --f-hand:     \"Caveat\", \"Marker Felt\", cursive;\n}\n*{box-sizing:border-box;}\nhtml,body{margin:0;padding:0;background:#d9c79a;color:var(--ink);font-family:var(--f-body);}\n\n/* ---- Stage scales A3 landscape to viewport ---- */\n.stage{position:fixed;inset:0;display:grid;place-items:center;overflow:hidden;\n  background:\n    radial-gradient(1400px 900px at 50% 50%, #e0cea0 0%, #c9b582 70%, #b09d6c 100%);}\n.poster-wrap{width:1754px;height:1240px;transform-origin:center;}\n\n/* ---- Poster ---- */\n.poster{\n  position:relative;width:100%;height:100%;\n  background:\n    radial-gradient(120% 90% at 50% 40%, #fbf2dc 0%, var(--paper) 40%, var(--paper-2) 80%, var(--paper-edge) 100%);\n  color:var(--ink);\n  overflow:hidden;\n  box-shadow:0 50px 100px rgba(60,40,10,.35), 0 0 0 1px rgba(0,0,0,.06);\n  isolation:isolate;\n}\n\n/* paper grain */\n.poster::before{\n  content:\"\";position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.5;mix-blend-mode:multiply;\n  background-image:\n    radial-gradient(circle at 18% 22%, rgba(120,80,30,.05) 0 1.2px, transparent 1.2px),\n    radial-gradient(circle at 72% 38%, rgba(120,80,30,.04) 0 1px, transparent 1px),\n    radial-gradient(circle at 41% 78%, rgba(120,80,30,.05) 0 1px, transparent 1px),\n    radial-gradient(circle at 88% 84%, rgba(120,80,30,.04) 0 1.2px, transparent 1.2px),\n    radial-gradient(circle at 8% 62%, rgba(120,80,30,.05) 0 1px, transparent 1px);\n  background-size: 9px 9px, 11px 11px, 13px 13px, 7px 7px, 10px 10px;\n}\n/* vignette */\n.poster::after{\n  content:\"\";position:absolute;inset:0;pointer-events:none;z-index:0;\n  background: radial-gradient(120% 90% at 50% 50%, transparent 55%, rgba(80,55,15,.18) 100%);\n}\n\n/* ---- Top decorative banner ---- */\n.top-band{\n  position:absolute;top:24px;left:40px;right:40px;\n  display:flex;justify-content:space-between;align-items:center;\n  font-family:var(--f-display);font-size:14px;letter-spacing:.32em;text-transform:uppercase;\n  color:var(--ink-soft);z-index:5;\n  white-space:nowrap;\n}\n.top-band .ornament{flex:1;display:flex;align-items:center;gap:10px;}\n.top-band .ornament .line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--ink-soft) 30%,var(--ink-soft) 70%,transparent);opacity:.5;}\n.top-band .center{padding:0 20px;}\n.top-band em{font-style:italic;font-family:var(--f-display);}\n\n/* ---- Main grid ---- */\n.canvas{\n  position:absolute;inset:118px 70px 260px 70px;\n  display:grid;\n  grid-template-columns: 1fr 1.05fr 1fr;\n  grid-template-rows: 1fr 1fr;\n  gap: 50px 36px;\n  z-index:2;\n}\n.cell{position:relative;}\n\n/* ============================================================\n   FRAME — base card\n   ============================================================ */\n.frame{\n  position:relative;\n  width:100%;height:100%;\n  background:\n    linear-gradient(180deg, rgba(255,250,235,.92), rgba(252,243,220,.85));\n  border-radius: 14px;\n  padding: 26px 28px 24px 28px;\n  display:flex;flex-direction:column;gap:10px;\n  box-shadow:\n    0 2px 0 rgba(60,40,10,.05),\n    0 18px 30px -20px rgba(60,40,10,.25),\n    inset 0 0 0 1px rgba(60,40,10,.07);\n}\n/* hand-drawn ink border */\n.frame .ink-border{\n  position:absolute;inset:6px;border-radius:10px;\n  border:1.2px solid var(--accent-d, var(--ink));\n  opacity:.85;pointer-events:none;\n}\n.frame .ink-border::after{\n  content:\"\";position:absolute;inset:-5px;border-radius:13px;\n  border:1px solid var(--accent-d, var(--ink));opacity:.35;\n}\n\n/* Section header line */\n.frame .sec-num{\n  font-family:var(--f-display);font-style:italic;font-weight:500;\n  font-size:18px;letter-spacing:.06em;\n  color:var(--accent-d);\n  display:flex;align-items:center;gap:10px;\n}\n.frame .sec-num .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}\n.frame h2{\n  font-family:var(--f-display);font-weight:600;\n  font-size:38px;line-height:1.0;letter-spacing:-.005em;\n  color:var(--accent-d);margin:0;\n}\n.frame h2 em{font-style:italic;font-weight:500;}\n.frame .lede{\n  font-family:var(--f-body);font-size:13.5px;line-height:1.5;\n  color:var(--ink-soft);max-width:95%;\n}\n.frame .keys{\n  display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;\n}\n.frame .keys span{\n  font-family:var(--f-display);font-style:italic;font-size:14px;letter-spacing:.02em;\n  color:var(--accent-d);\n  padding:1px 9px 2px;border-radius:999px;\n  background:color-mix(in oklab, var(--accent) 18%, transparent);\n  border:1px solid color-mix(in oklab, var(--accent) 35%, transparent);\n}\n\n/* Text placeholder area */\n.frame .slot{\n  flex:1;margin-top:6px;border-radius:10px;\n  background:\n    linear-gradient(180deg, rgba(255,250,235,.55), rgba(255,247,225,.35));\n  min-height:0;\n  position:relative;\n  padding: 14px 16px 12px;\n  display:flex;flex-direction:column;gap:10px;\n  border: 1px dashed color-mix(in oklab, var(--accent) 38%, transparent);\n  cursor: pointer;\n  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;\n}\n.frame .slot:hover{\n  transform: translateY(-2px);\n  border-color: color-mix(in oklab, var(--accent) 75%, transparent);\n  box-shadow: 0 10px 24px -12px color-mix(in oklab, var(--accent-d) 65%, transparent);\n}\n.frame .slot ul.bullets{\n  list-style:none;margin:0;padding:0;\n  display:flex;flex-direction:column;gap:7px;\n}\n.frame .slot li{\n  font-family:var(--f-body);font-size:12.5px;line-height:1.4;\n  color:var(--ink);\n  padding-left:18px;position:relative;\n}\n.frame .slot li::before{\n  content:\"\";position:absolute;left:0;top:7px;\n  width:7px;height:7px;border-radius:50%;\n  background:var(--accent);\n  box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent) 20%, transparent);\n}\n.frame .slot li b{ font-weight:600; color:var(--accent-d); font-style:italic; font-family:var(--f-display); font-size:13.5px;}\n.frame .slot .more-btn{\n  margin-top:auto;align-self:flex-end;\n  font-family:var(--f-body);font-size:11.5px;font-weight:500;letter-spacing:.04em;\n  background: color-mix(in oklab, var(--accent) 12%, transparent);\n  border:1px solid color-mix(in oklab, var(--accent) 55%, transparent);\n  color:var(--accent-d);\n  padding:5px 12px 6px;border-radius:999px;\n  cursor:pointer;\n  display:inline-flex;align-items:center;gap:6px;\n  transition: background .2s ease, transform .2s ease;\n}\n.frame .slot .more-btn:hover{\n  background: color-mix(in oklab, var(--accent) 25%, transparent);\n  transform: translateY(-1px);\n}\n.frame .slot .more-btn .plus{\n  display:inline-block;width:14px;height:14px;border-radius:50%;\n  background:var(--accent-d);color:var(--paper);\n  font-size:11px;line-height:14px;text-align:center;\n}\n\n/* ============================================================\n   Details popup — inside poster, shown when frame is activated\n   ============================================================ */\n.details{\n  position:absolute;z-index:18;\n  width:320px;\n  background: linear-gradient(180deg, #fff8e3 0%, #f4e2bd 100%);\n  border:1.5px solid var(--accent-d, #6a4a18);\n  border-radius:14px;\n  padding:18px 20px 18px;\n  box-shadow:\n    0 24px 50px -12px rgba(40,25,0,.4),\n    0 0 0 4px rgba(255,250,235,.5);\n  font-family:var(--f-body);font-size:12.5px;line-height:1.5;color:var(--ink);\n  opacity:0;pointer-events:none;\n  transform: scale(.82) translateY(8px);\n  transform-origin: center center;\n  transition: opacity .4s ease, transform .4s cubic-bezier(.4,0,.2,1);\n}\n.details.active{\n  opacity:1;pointer-events:auto;\n  transform: scale(1) translateY(0);\n}\n.details h4{\n  font-family:var(--f-display);font-style:italic;font-weight:600;\n  font-size:24px;line-height:1.0;\n  color:var(--accent-d);margin:0 0 4px 0;\n}\n.details .lbl{\n  display:block;font-family:var(--f-display);font-style:italic;\n  font-size:13px;letter-spacing:.06em;\n  color:var(--ink-soft);margin-bottom:10px;\n}\n.details ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}\n.details li{padding-left:16px;position:relative;}\n.details li::before{\n  content:\"\";position:absolute;left:0;top:7px;\n  width:6px;height:6px;border-radius:50%;background:var(--accent);\n}\n.details .close{\n  position:absolute;top:10px;right:10px;width:28px;height:28px;\n  border:1px solid color-mix(in oklab, var(--accent-d) 40%, transparent);\n  background:rgba(255,250,235,.85);\n  border-radius:50%;font-size:15px;line-height:1;color:var(--ink-soft);\n  cursor:pointer;display:grid;place-items:center;\n  transition: background .2s ease, color .2s ease, transform .2s ease;\n}\n.details .close:hover{ background:#fff; color:var(--accent-d); transform: rotate(90deg);}\n\n/* Per-frame details positions */\n.details.d-politik       { --accent: var(--c-politik);      --accent-d: var(--c-politik-d);      top: 160px; left: 600px; }\n.details.d-gesellschaft  { --accent: var(--c-gesellschaft); --accent-d: var(--c-gesellschaft-d); top: 160px; right: 600px; }\n.details.d-wirtschaft    { --accent: var(--c-wirtschaft);   --accent-d: var(--c-wirtschaft-d);   top: 600px; left: 600px; }\n.details.d-herausford    { --accent: var(--c-herausford);   --accent-d: var(--c-herausford-d);   top: 600px; right: 600px; }\n.details.d-bewertung     {\n  --accent: var(--c-bewertung); --accent-d: var(--c-bewertung-d);\n  top: 720px; left: 50%;\n  width: 560px;\n  transform: translateX(-50%) scale(.82) translateY(8px);\n  transform-origin: bottom center;\n}\n.details.d-bewertung.active{\n  transform: translateX(-50%) scale(1) translateY(0);\n}\n\n/* Backdrop when a frame is activated */\n.zoom-backdrop{\n  position:absolute;inset:0;\n  background: radial-gradient(120% 90% at 50% 50%, transparent 30%, rgba(40,25,0,.18) 100%);\n  opacity:0;pointer-events:none;\n  transition: opacity .5s ease;\n  z-index:5;\n}\n.zoom-backdrop.active{ opacity:1; }\n\n/* smooth programmatic transitions */\n.poster-wrap.smooth{\n  transition: transform .65s cubic-bezier(.4,0,.2,1);\n}\n\n/* per-section colors */\n.f-politik       { --accent: var(--c-politik);      --accent-d: var(--c-politik-d); }\n.f-gesellschaft  { --accent: var(--c-gesellschaft); --accent-d: var(--c-gesellschaft-d); }\n.f-wirtschaft    { --accent: var(--c-wirtschaft);   --accent-d: var(--c-wirtschaft-d); }\n.f-herausford    { --accent: var(--c-herausford);   --accent-d: var(--c-herausford-d); }\n.f-bewertung     { --accent: var(--c-bewertung);    --accent-d: var(--c-bewertung-d); }\n\n/* ============================================================\n   ORNAMENTS — decorative SVGs around each frame\n   ============================================================ */\n.orn{position:absolute;pointer-events:none;color:var(--accent-d);}\n.orn svg{display:block;width:100%;height:100%;overflow:visible;}\n\n/* gentle motion */\n@keyframes sway      { 0%,100%{transform:rotate(-2.5deg);} 50%{transform:rotate(2.5deg);} }\n@keyframes sway-r    { 0%,100%{transform:rotate(2.5deg);}  50%{transform:rotate(-2.5deg);} }\n@keyframes drift     { 0%,100%{transform:translateY(0);}    50%{transform:translateY(-6px);} }\n@keyframes spin-slow { from{transform:rotate(0);} to{transform:rotate(360deg);} }\n@keyframes pulse     { 0%,100%{opacity:1;}                  50%{opacity:.55;} }\n@keyframes draw      { from{stroke-dashoffset:1200;} to{stroke-dashoffset:0;} }\n\n/* Title flourish — drawn line under each section title */\n.title-flourish{\n  display:block;width:110px;height:16px;\n  color:var(--accent);\n  margin: 3px 0 6px 0;\n  overflow:visible;\n}\n.title-flourish path{\n  fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;\n  stroke-dasharray: 160;\n  stroke-dashoffset: 160;\n  animation: flourish-draw 2s ease-out .3s forwards, flourish-shimmer 8s ease-in-out 2.5s infinite;\n}\n.title-flourish .pip{\n  fill:currentColor;\n  transform-origin: center;\n  transform-box: fill-box;\n  animation: flourish-pip 3s ease-in-out infinite;\n}\n.title-flourish .pip.b{ animation-delay:.6s; }\n.title-flourish .pip.c{ animation-delay:1.2s; }\n@keyframes flourish-draw{\n  to { stroke-dashoffset: 0; }\n}\n@keyframes flourish-shimmer{\n  0%, 100% { opacity: 1; }\n  50%      { opacity: .55; }\n}\n@keyframes flourish-pip{\n  0%,100%{ transform:scale(.7); opacity:.6;}\n  50%   { transform:scale(1.2); opacity:1;}\n}\n\n/* h2 gentle glow */\n.frame h2, .bewertung-band .title{\n  animation: title-glow 7s ease-in-out infinite;\n}\n@keyframes title-glow{\n  0%,100%{ text-shadow: 0 1px 0 rgba(0,0,0,.02); }\n  50%   { text-shadow: 0 1px 0 rgba(0,0,0,.02), 0 0 18px color-mix(in oklab, var(--accent) 35%, transparent);}\n}\n\n/* small kicker (sec-num) — subtle letter-drift */\n.frame .sec-num{ animation: kicker-drift 9s ease-in-out infinite; transform-origin:left center;}\n@keyframes kicker-drift{\n  0%,100%{ transform:translateX(0);}\n  50%   { transform:translateX(3px);}\n}\n\n/* ============================================================\n   01 POLITIK — classical columns / pediment\n   ============================================================ */\n.cell.politik{ grid-column:1; grid-row:1; }\n.orn.columns{\n  position:absolute;top:-40px;left:-14px;right:-14px;height:48px;\n  display:flex;justify-content:space-between;align-items:flex-end;\n  z-index:3;\n}\n.orn.columns .col{width:16px;height:40px;color:var(--c-politik-d);}\n.orn.pediment{\n  position:absolute;top:-70px;left:-20px;right:-20px;height:40px;z-index:3;\n}\n.orn.scale-balance{\n  position:absolute;bottom:-42px;left:50%;transform:translateX(-50%);\n  width:120px;height:60px;color:var(--c-politik-d);\n  animation: drift 6s ease-in-out infinite;\n}\n\n/* ============================================================\n   02 GESELLSCHAFT — people figures around\n   ============================================================ */\n.cell.gesellschaft{ grid-column:3; grid-row:1; }\n.orn.people-top{\n  position:absolute;top:-46px;left:8%;right:8%;height:48px;z-index:3;\n  display:flex;justify-content:space-between;align-items:flex-end;\n}\n.orn.people-top .p{width:34px;height:46px;color:var(--c-gesellschaft-d);}\n.orn.people-top .p:nth-child(2){animation: drift 5s ease-in-out infinite;}\n.orn.people-top .p:nth-child(4){animation: drift 6s ease-in-out .5s infinite;}\n.orn.heart{\n  position:absolute;top:-32px;right:-18px;width:48px;height:48px;color:var(--c-gesellschaft);\n  animation: drift 4s ease-in-out infinite;\n  z-index:4;\n  filter: drop-shadow(0 4px 6px rgba(120,40,20,.18));\n}\n.orn.confetti{\n  position:absolute;top:-30px;right:8px;width:60px;height:34px;color:var(--c-gesellschaft-d);\n}\n\n/* ============================================================\n   03 WIRTSCHAFT — wheat & coins\n   ============================================================ */\n.cell.wirtschaft{ grid-column:1; grid-row:2; }\n.orn.wheat-l{\n  position:absolute;left:-38px;top:-10px;bottom:-10px;width:48px;color:var(--c-wirtschaft-d);\n  animation: sway 9s ease-in-out infinite;\n  transform-origin: 50% 90%;\n}\n.orn.wheat-r{\n  position:absolute;right:-38px;top:-10px;bottom:-10px;width:48px;color:var(--c-wirtschaft-d);\n  animation: sway-r 9s ease-in-out infinite;\n  transform-origin: 50% 90%;\n}\n.orn.coins{\n  position:absolute;bottom:-30px;left:30%;width:140px;height:54px;color:var(--c-wirtschaft-d);\n}\n.orn.coins .coin{animation: drift 4s ease-in-out infinite;}\n.orn.coins .coin:nth-child(2){animation-delay:.4s;}\n.orn.coins .coin:nth-child(3){animation-delay:.8s;}\n\n/* ============================================================\n   04 HERAUSFORDERUNGEN — vines & leaves\n   ============================================================ */\n.cell.herausford{ grid-column:3; grid-row:2; }\n.orn.vine-top{\n  position:absolute;top:-38px;left:-14px;right:-14px;height:46px;color:var(--c-herausford-d);\n  z-index:3;\n}\n.orn.leaf{\n  position:absolute;width:42px;height:42px;color:var(--c-herausford-d);\n  animation: sway 7s ease-in-out infinite;\n  transform-origin: 50% 90%;\n}\n.orn.leaf.l1{ top:-22px;  right:90px; }\n.orn.leaf.l2{ top:30px;   right:-30px; animation-delay:1.2s;}\n.orn.leaf.l3{ bottom:-12px; left:-30px; animation-delay:.6s;}\n.orn.globe{\n  position:absolute;bottom:-32px;right:18px;width:54px;height:54px;color:var(--c-herausford-d);\n  animation: spin-slow 30s linear infinite;\n}\n\n/* ============================================================\n   CENTER MEDALLION — Europa 2050\n   ============================================================ */\n.cell.center{ grid-column:2; grid-row:1 / -1; position:relative; display:grid; place-items:center;}\n.medallion{\n  position:relative;width:520px;height:520px;\n}\n.medallion .rays{\n  position:absolute;inset:-30px;\n  animation: spin-slow 90s linear infinite;\n  color: var(--gold-deep);\n  opacity:.85;\n}\n.medallion .stars-ring{\n  position:absolute;inset:50px;\n  animation: spin-slow 80s linear infinite reverse;\n  color: var(--gold);\n}\n.medallion .disk{\n  position:absolute;inset:80px;border-radius:50%;\n  background:\n    radial-gradient(circle at 35% 30%, #fbf2dc, var(--paper) 55%, var(--paper-2) 100%);\n  box-shadow:\n    inset 0 0 0 1.5px var(--gold-deep),\n    inset 0 0 0 7px var(--paper),\n    inset 0 0 0 8px var(--gold),\n    inset 0 0 0 11px var(--paper),\n    inset 0 0 0 12.5px var(--gold-deep),\n    0 30px 50px -25px rgba(60,40,10,.4);\n}\n.medallion .disk-inner{\n  position:absolute;inset:80px;\n  border-radius:50%;\n  pointer-events:none;\n}\n.medallion .arched{\n  position:absolute;inset:0;color:var(--c-bewertung-d);\n}\n.medallion .arched text{\n  font-family:var(--f-display);font-style:italic;font-weight:600;\n  font-size:26px;letter-spacing:.14em;fill:var(--ink);\n}\n/* Subtle frame inside disk (replaces hard divider) */\n.medallion .inner-ring{\n  position:absolute;\n  left: calc(50% - 154px); top: calc(50% - 154px);\n  width:308px;height:308px;\n  border-radius:50%;\n  border:1px dashed color-mix(in oklab, var(--gold-deep) 65%, transparent);\n  opacity:.6;\n  pointer-events:none;\n  animation: spin-slow 120s linear infinite;\n}\n.medallion .year{\n  position:absolute;left:50%;top:130px;transform:translateX(-50%);\n  font-family:var(--f-display);font-weight:600;font-style:italic;\n  font-size:124px;line-height:1;color:var(--ink);\n  letter-spacing:-.01em;\n  white-space:nowrap;\n  animation: year-glow 6s ease-in-out infinite;\n}\n@keyframes year-glow{\n  0%,100%{ text-shadow: 0 1px 0 rgba(0,0,0,.03);}\n  50%   { text-shadow: 0 1px 0 rgba(0,0,0,.03), 0 0 28px rgba(201,152,43,.35);}\n}\n.medallion .fleuron{\n  position:absolute;left:50%;top:266px;transform:translateX(-50%);\n  display:flex;align-items:center;gap:12px;\n  color:var(--gold-deep);\n}\n.medallion .fleuron .d{width:5px;height:5px;border-radius:50%;background:currentColor;animation: pulse 3s ease-in-out infinite;}\n.medallion .fleuron .d.b{ animation-delay:.5s; }\n.medallion .fleuron .d.c{ animation-delay:1s; }\n.medallion .fleuron svg{ width:64px;height:14px; color:currentColor;}\n\n/* twinkling decorative stars around medallion */\n.decostar{\n  position:absolute;color:var(--gold);\n  animation: pulse 3s ease-in-out infinite;\n}\n.decostar svg{display:block;width:100%;height:100%;}\n\n/* ============================================================\n   05 BEWERTUNG — bottom ribbon banner\n   ============================================================ */\n.bewertung-band{\n  position:absolute;left:60px;right:60px;bottom:50px;height:180px;z-index:3;\n  --accent: var(--c-bewertung);\n  --accent-d: var(--c-bewertung-d);\n}\n.bewertung-band .ribbon{\n  position:absolute;inset:0;\n  background:\n    linear-gradient(180deg, #fbf2dc, #f0deba);\n  border-radius: 8px;\n  box-shadow:\n    0 2px 0 rgba(60,40,10,.05),\n    0 18px 30px -20px rgba(60,40,10,.25),\n    inset 0 0 0 1px rgba(60,40,10,.07);\n}\n.bewertung-band .ribbon::before,\n.bewertung-band .ribbon::after{\n  content:\"\";position:absolute;top:14px;bottom:14px;width:34px;\n  background:var(--c-bewertung-d);\n  -webkit-clip-path: polygon(0 0, 100% 0, 70% 50%, 100% 100%, 0 100%);\n          clip-path: polygon(0 0, 100% 0, 70% 50%, 100% 100%, 0 100%);\n}\n.bewertung-band .ribbon::before{ left:-34px; }\n.bewertung-band .ribbon::after{ right:-34px; transform: scaleX(-1);}\n\n.bewertung-band .ink-border{\n  position:absolute;inset:6px;border-radius:5px;\n  border:1.2px solid var(--c-bewertung-d);opa u002Fpath>\n                <path d=\"M 400 28 q -12 -12 0 -22 q 14 6 10 22 z\"><\u002Fpath>\n                <path d=\"M 490 18 q 6 -14 20 -8 q 2 14 -16 16 z\"><\u002Fpath>\n                <path d=\"M 560 32 q -10 -12 2 -22 q 14 6 10 22 z\"><\u002Fpath>\n              <\u002Fg>\n            <\u002Fsvg>\n          <\u002Fdiv>\n\n          <div class=\"orn leaf l1\">\n            <svg viewBox=\"0 0 42 42\"><path d=\"M 8 38 Q 8 8 38 8 Q 38 38 8 38 Z\" fill=\"currentColor\"><\u002Fpath><path d=\"M 8 38 L 38 8\" stroke=\"#f4e8cf\" stroke-width=\"1.4\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"orn leaf l2\">\n            <svg viewBox=\"0 0 42 42\"><path d=\"M 4 22 Q 22 -2 40 22 Q 22 46 4 22 Z\" fill=\"currentColor\"><\u002Fpath><path d=\"M 4 22 L 40 22\" stroke=\"#f4e8cf\" stroke-width=\"1.4\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"orn leaf l3\">\n            <svg viewBox=\"0 0 42 42\"><path d=\"M 8 38 Q 8 8 38 8 Q 38 38 8 38 Z\" fill=\"currentColor\"><\u002Fpath><path d=\"M 8 38 L 38 8\" stroke=\"#f4e8cf\" stroke-width=\"1.4\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n\n          <div class=\"frame f-herausford\">\n            <div class=\"ink-border\"><\u002Fdiv>\n            <div class=\"sec-num\"><span class=\"dot\"><\u002Fspan>IV · Vierter Teil<\u002Fdiv>\n            <h2>Umgang mit <em>Herausforderungen<\u002Fem><\u002Fh2>\n            <svg class=\"title-flourish\" viewBox=\"0 0 96 14\" aria-hidden=\"true\">\n              <path d=\"M 4 9 Q 24 -2 48 9 T 92 9\"><\u002Fpath>\n              <circle class=\"pip\" cx=\"4\" cy=\"9\" r=\"1.8\"><\u002Fcircle>\n              <circle class=\"pip b\" cx=\"48\" cy=\"9\" r=\"2.4\"><\u002Fcircle>\n              <circle class=\"pip c\" cx=\"92\" cy=\"9\" r=\"1.8\"><\u002Fcircle>\n            <\u002Fsvg>\n            <p class=\"lede\">Migration · Umwelt · internationale Politik · Entwicklungs­zusammenarbeit · Konflikte zwischen Mitgliedstaaten.<\u002Fp>\n            <div class=\"keys\"><span>Migration<\u002Fspan><span>Klima<\u002Fspan><span>Geopolitik<\u002Fspan><span>Konflikte<\u002Fspan><\u002Fdiv>\n            <div class=\"slot\" data-frame=\"herausford\">\n              <ul class=\"bullets\">\n                <li><b>Migration:<\u002Fb> gezielte Verteilung nach Berufsbedarf und Flächengröße der Länder — keine Überlastung kleiner Regionen.<\u002Fli>\n                <li><b>Klima &amp; Umwelt:<\u002Fb> gemeinsame Energiepolitik über das europäische Stromnetz statt 27 nationaler Strategien.<\u002Fli>\n                <li><b>Konflikte:<\u002Fb> ein gemeinsames Militär entschärft Streit zwischen Mitgliedstaaten und bündelt Außenpolitik.<\u002Fli>\n                <li><b>Entwicklungszusammenarbeit:<\u002Fb> langfristige Partnerschaften mit ärmeren Ländern, statt kurzfristiger Hilfen mit Bedingungen.<\u002Fli>\n              <\u002Ful>\n              <button class=\"more-btn\" data-frame=\"herausford\" type=\"button\"><span class=\"plus\">+<\u002Fspan> Begründung<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- globe -->\n          <div class=\"orn globe\">\n            <svg viewBox=\"0 0 54 54\">\n              <circle cx=\"27\" cy=\"27\" r=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><\u002Fcircle>\n              <ellipse cx=\"27\" cy=\"27\" rx=\"22\" ry=\"9\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\"><\u002Fellipse>\n              <ellipse cx=\"27\" cy=\"27\" rx=\"9\" ry=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\"><\u002Fellipse>\n              <path d=\"M 6 22 q 12 4 22 0 t 20 0\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <!-- ==================== Bewertung — bottom ribbon ==================== -->\n      <div class=\"bewertung-band\">\n        <div class=\"ribbon\">\n          <div class=\"ink-border\"><\u002Fdiv>\n          <div class=\"content\">\n            <div class=\"num\">V<small>Schluss<\u002Fsmall><\u002Fdiv>\n            <div>\n              <div class=\"title\">\n                Eigene begründete <em>Bewertung<\u002Fem>\n                <svg class=\"title-flourish\" viewBox=\"0 0 120 14\" aria-hidden=\"true\" style=\"width:120px;\">\n                  <path d=\"M 4 9 Q 30 -2 60 9 T 116 9\"><\u002Fpath>\n                  <circle class=\"pip\" cx=\"4\" cy=\"9\" r=\"2\"><\u002Fcircle>\n                  <circle class=\"pip b\" cx=\"60\" cy=\"9\" r=\"2.6\"><\u002Fcircle>\n                  <circle class=\"pip c\" cx=\"116\" cy=\"9\" r=\"2\"><\u002Fcircle>\n                <\u002Fsvg>\n              <\u002Fdiv>\n              <ul class=\"bullets\">\n                <li><b>Insgesamt positiv:<\u002Fb> die EU 2050 ist effizienter, solidarischer und bürokratisch leichter als heute.<\u002Fli>\n                <li><b>Tausch sinnvoll:<\u002Fb> mehr Kontrolle im Inland, dafür mehr Freiheit zwischen den Ländern.<\u002Fli>\n                <li><b>Richtige Skala:<\u002Fb> Klima, Energie und Sicherheit europäisch gedacht statt national zerstreut.<\u002Fli>\n                <li><b>Demokratie bleibt:<\u002Fb> Bürger-Prioritäten halten die Union erkennbar volksnah.<\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div class=\"right-col\">\n              <svg class=\"quill\" viewBox=\"0 0 90 90\" aria-hidden=\"true\">\n                <g fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\">\n                  <path d=\"M 10 78 Q 30 60 50 50 Q 70 40 80 18\"><\u002Fpath>\n                  <path d=\"M 80 18 L 64 18 L 64 34\"><\u002Fpath>\n                  <path d=\"M 80 18 L 80 34 L 64 34\"><\u002Fpath>\n                  <path d=\"M 22 78 L 30 70\"><\u002Fpath>\n                  <path d=\"M 30 78 L 38 70\"><\u002Fpath>\n                  <path d=\"M 38 78 L 46 70\"><\u002Fpath>\n                  <path d=\"M 50 50 L 56 56\"><\u002Fpath>\n                  <path d=\"M 56 44 L 62 50\"><\u002Fpath>\n                  <path d=\"M 62 38 L 68 44\"><\u002Fpath>\n                <\u002Fg>\n              <\u002Fsvg>\n              <button class=\"more-btn\" data-frame=\"bewertung\" type=\"button\"><span class=\"plus\">+<\u002Fspan> Fazit<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ==================== Zoom backdrop + Details popups ==================== -->\n      <div class=\"zoom-backdrop\" id=\"zoomBackdrop\"><\u002Fdiv>\n\n      <div class=\"details d-politik\" id=\"details-politik\" role=\"dialog\" aria-labelledby=\"dp-h\">\n        <button class=\"close\" aria-label=\"Schließen\">×<\u002Fbutton>\n        <span class=\"lbl\">Begründung · Warum so?<\u002Fspan>\n        <h4 id=\"dp-h\">Politische Entwicklung<\u002Fh4>\n        <ul>\n          <li>Ein gemeinsames Militär ist günstiger, schneller einsatzfähig und beendet Streit über Zuständigkeiten zwischen Mitgliedstaaten.<\u002Fli>\n          <li>Strengere Kontrolle senkt Steuerhinterziehung und Subventionsmissbrauch — ein faireres System für alle, die ehrlich arbeiten.<\u002Fli>\n          <li>Regelmäßige Bürger-Prioritäten schließen die Lücke zwischen Brüsseler Politik und dem Alltag der Menschen.<\u002Fli>\n          <li>Institutionen behalten Hoheit, müssen aber transparent erklären, wenn sie Bürgerthemen ablehnen.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"details d-gesellschaft\" id=\"details-gesellschaft\" role=\"dialog\" aria-labelledby=\"dg-h\">\n        <button class=\"close\" aria-label=\"Schließen\">×<\u002Fbutton>\n        <span class=\"lbl\">Begründung · Warum so?<\u002Fspan>\n        <h4 id=\"dg-h\">Gesellschaft<\u002Fh4>\n        <ul>\n          <li>Die digitale Identität spart Wartezeiten und macht Studium, Arbeit und Reisen in jedem EU-Land ohne Papierkram möglich.<\u002Fli>\n          <li>Englisch als gemeinsame Sprache verbindet, ohne Muttersprachen zu verdrängen — sie bleibt zusätzliche Brücke, nicht Ersatz.<\u002Fli>\n          <li>Bestehende Technologien zu nutzen ist klug: kein Wettlauf gegen US- und China-Konzerne, dafür gezielter Einsatz in Verwaltung, Bildung und Medizin.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"details d-wirtschaft\" id=\"details-wirtschaft\" role=\"dialog\" aria-labelledby=\"dw-h\">\n        <button class=\"close\" aria-label=\"Schließen\">×<\u002Fbutton>\n        <span class=\"lbl\">Begründung · Warum so?<\u002Fspan>\n        <h4 id=\"dw-h\">Wirtschaft &amp; Zusammenarbeit<\u002Fh4>\n        <ul>\n          <li>Eine digitale Währung beschleunigt Handel, macht Geldflüsse nachvollziehbar und erschwert Korruption.<\u002Fli>\n          <li>Das Stromnetz nutzt jede Region nach ihren Stärken — Sonne im Süden, Wind an den Küsten, Wasserkraft im Norden — statt 27 nebeneinanderlaufender Systeme.<\u002Fli>\n          <li>Bedingungslose Entwicklungshilfe schafft langfristig stabile Partner und sichert Rohstoffe sowie Absatzmärkte ohne politische Erpressung.<\u002Fli>\n          <li>Wegfall der Zollgrenzen senkt Preise und macht Lieferketten widerstandsfähiger.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"details d-herausford\" id=\"details-herausford\" role=\"dialog\" aria-labelledby=\"dh-h\">\n        <button class=\"close\" aria-label=\"Schließen\">×<\u002Fbutton>\n        <span class=\"lbl\">Begründung · Warum so?<\u002Fspan>\n        <h4 id=\"dh-h\">Umgang mit Herausforderungen<\u002Fh4>\n        <ul>\n          <li>Faire Migrationsverteilung verhindert Überlastung einzelner Länder und nutzt Zuwanderung gezielt dort, wo Fachkräfte fehlen.<\u002Fli>\n          <li>Ein gemeinsamer Klimaplan wirkt stärker als 27 einzelne Strategien — Emissionen kennen keine Grenzen.<\u002Fli>\n          <li>Ein EU-Militär unterbindet Konflikte zwischen Mitgliedern, weil keine Seite mehr allein eskalieren kann.<\u002Fli>\n          <li>Strategische Entwicklungspartnerschaften verringern Migrationsdruck an der Wurzel.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"details d-bewertung\" id=\"details-bewertung\" role=\"dialog\" aria-labelledby=\"db-h\">\n        <button class=\"close\" aria-label=\"Schließen\">×<\u002Fbutton>\n        <span class=\"lbl\">Fazit · mein Ausblick<\u002Fspan>\n        <h4 id=\"db-h\">Eigene begründete Bewertung<\u002Fh4>\n        <ul>\n          <li>Der Tausch <em>‚mehr Kontrolle gegen mehr Möglichkeit‘<\u002Fem> lohnt sich, solange Bürger-Prioritäten verbindlich bleiben — sonst entsteht ein technokratischer Staat.<\u002Fli>\n          <li>Die EU 2050 funktioniert als <em>ein<\u002Fem> gemeinsames Projekt, nicht als 27 nebeneinander stehende Staaten — das ist die richtige Antwort auf Klima, Migration und Außenpolitik.<\u002Fli>\n          <li>Risiken bleiben: Überregulierung, digitale Abhängigkeit, kultureller Druck durch Englisch. Diese Punkte müssen offen diskutiert werden.<\u002Fli>\n          <li>Insgesamt halte ich die Entwicklung für tragfähig und wertvoll — weil sie Bürger nicht nur verwaltet, sondern in Entscheidungen einbindet.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- ==================== Bottom meta ==================== -->\n      <div class=\"bottom-meta\">\n        <div>Plakat · Europäische Union 2050<\u002Fdiv>\n        <svg class=\"flourish\" viewBox=\"0 0 100 14\" aria-hidden=\"true\">\n          <path d=\"M 2 7 Q 20 -2 40 7 T 78 7\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\"><\u002Fpath>\n          <circle cx=\"40\" cy=\"7\" r=\"2\" fill=\"currentColor\"><\u002Fcircle>\n          <circle cx=\"78\" cy=\"7\" r=\"1.4\" fill=\"currentColor\"><\u002Fcircle>\n          <circle cx=\"92\" cy=\"7\" r=\"1\" fill=\"currentColor\"><\u002Fcircle>\n        <\u002Fsvg>\n        <div>27 Mitgliedstaaten · <em>una res publica<\u002Fem><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Farticle>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"usage-hint\" id=\"usageHint\">\n  <span><span class=\"k\">Scroll<\u002Fspan> zum Zoomen<\u002Fspan>\n  <span style=\"opacity:.4;\">·<\u002Fspan>\n  <span><span class=\"k\">Ziehen<\u002Fspan> zum Bewegen<\u002Fspan>\n  <span style=\"opacity:.4;\">·<\u002Fspan>\n  <span><span class=\"k\">Doppelklick<\u002Fspan> reset<\u002Fspan>\n<\u002Fdiv>\n\n<script>\n/* ============================================================\n   Scale + pan/zoom — fit to viewport, mouse wheel zoom, drag to pan\n   ============================================================ */\n(function(){\n  const stage = document.querySelector('.stage');\n  const wrap  = document.getElementById('posterWrap');\n  const hint  = document.getElementById('usageHint');\n  const W = 1754, H = 1240;\n\n  let fitScale = 1, userScale = 1, tx = 0, ty = 0;\n\n  function apply(){\n    const s = fitScale * userScale;\n    wrap.style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;\n  }\n  function fit(){\n    const vw = window.innerWidth, vh = window.innerHeight;\n    const pad = 40;\n    fitScale = Math.min((vw - pad) / W, (vh - pad) / H);\n    apply();\n  }\n  fit();\n  window.addEventListener('resize', fit);\n\n  /* zoom on wheel — anchored to cursor */\n  stage.addEventListener('wheel', (e) => {\n    e.preventDefault();\n    const oldU = userScale;\n    const newU = Math.max(0.5, Math.min(4, oldU * Math.exp(-e.deltaY * 0.0018)));\n    const rect = stage.getBoundingClientRect();\n    const mx = e.clientX - rect.left - rect.width / 2;\n    const my = e.clientY - rect.top  - rect.height / 2;\n    const factor = newU / oldU;\n    tx = mx - (mx - tx) * factor;\n    ty = my - (my - ty) * factor;\n    userScale = newU;\n    apply();\n  }, { passive:false });\n\n  /* drag to pan */\n  let dragging = false, lastX = 0, lastY = 0;\n  stage.addEventListener('mousedown', (e) => {\n    dragging = true; lastX = e.clientX; lastY = e.clientY;\n    stage.style.cursor = 'grabbing';\n  });\n  window.addEventListener('mousemove', (e) => {\n    if(!dragging) return;\n    tx += e.clientX - lastX;\n    ty += e.clientY - lastY;\n    lastX = e.clientX; lastY = e.clientY;\n    apply();\n  });\n  window.addEventListener('mouseup', () => {\n    dragging = false; stage.style.cursor = 'grab';\n  });\n  stage.style.cursor = 'grab';\n\n  /* double click reset */\n  stage.addEventListener('dblclick', () => {\n    userScale = 1; tx = 0; ty = 0; apply();\n  });\n\n  /* touch pinch + drag */\n  let touchMode = null, t0 = null, t1 = null, startDist = 0, startScale = 1;\n  stage.addEventListener('touchstart', (e) => {\n    if(e.touches.length === 1){\n      touchMode = 'pan';\n      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;\n    } else if(e.touches.length === 2){\n      touchMode = 'zoom';\n      t0 = { x: e.touches[0].clientX, y: e.touches[0].clientY };\n      t1 = { x: e.touches[1].clientX, y: e.touches[1].clientY };\n      startDist = Math.hypot(t1.x - t0.x, t1.y - t0.y);\n      startScale = userScale;\n    }\n  }, { passive:false });\n  stage.addEventListener('touchmove', (e) => {\n    e.preventDefault();\n    if(touchMode === 'pan' && e.touches.length === 1){\n      tx += e.touches[0].clientX - lastX;\n      ty += e.touches[0].clientY - lastY;\n      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;\n      apply();\n    } else if(touchMode === 'zoom' && e.touches.length === 2){\n      const dx = e.touches[1].clientX - e.touches[0].clientX;\n      const dy = e.touches[1].clientY - e.touches[0].clientY;\n      const dist = Math.hypot(dx, dy);\n      userScale = Math.max(0.5, Math.min(4, startScale * dist / startDist));\n      apply();\n    }\n  }, { passive:false });\n  stage.addEventListener('touchend', () => { touchMode = null; });\n\n  /* fade out hint after a while */\n  if(hint){\n    setTimeout(() => hint.classList.add('fade'), 7000);\n    const fade = () => hint.classList.add('fade');\n    stage.addEventListener('wheel', fade, { once:true });\n    stage.addEventListener('mousedown', fade, { once:true });\n  }\n\n  /* ============================================================\n     Frame click → zoom in + show details popup\n     ============================================================ */\n  const frameCenters = {\n    politik:      { x: 376,  y: 333,  zoom: 1.7 },\n    gesellschaft: { x: 1378, y: 333,  zoom: 1.7 },\n    wirtschaft:   { x: 376,  y: 815,  zoom: 1.7 },\n    herausford:   { x: 1378, y: 815,  zoom: 1.7 },\n    bewertung:    { x: 877,  y: 1100, zoom: 1.6 },\n  };\n  const backdrop = document.getElementById('zoomBackdrop');\n  let activeFrame = null;\n\n  function activateFrame(id){\n    const cfg = frameCenters[id];\n    if(!cfg) return;\n    activeFrame = id;\n    /* hide other popups */\n    document.querySelectorAll('.details').forEach(d => d.classList.remove('active'));\n    /* zoom to that frame */\n    userScale = cfg.zoom;\n    const s = fitScale * userScale;\n    tx = (W/2 - cfg.x) * s;\n    ty = (H/2 - cfg.y) * s;\n    wrap.classList.add('smooth');\n    apply();\n    /* show the popup after the zoom starts moving */\n    setTimeout(() => {\n      const popup = document.getElementById('details-' + id);\n      if(popup) popup.classList.add('active');\n      backdrop && backdrop.classList.add('active');\n    }, 220);\n    setTimeout(() => wrap.classList.remove('smooth'), 700);\n  }\n\n  function resetView(){\n    document.querySelectorAll('.details').forEach(d => d.classList.remove('active'));\n    backdrop && backdrop.classList.remove('active');\n    activeFrame = null;\n    userScale = 1; tx = 0; ty = 0;\n    wrap.classList.add('smooth');\n    apply();\n    setTimeout(() => wrap.classList.remove('smooth'), 700);\n  }\n\n  document.querySelectorAll('.more-btn').forEach(btn => {\n    btn.addEventListener('click', (e) => {\n      e.stopPropagation();\n      e.preventDefault();\n      const id = btn.dataset.frame;\n      if(activeFrame === id) resetView();\n      else activateFrame(id);\n    });\n    btn.addEventListener('mousedown', (e) => e.stopPropagation());\n  });\n  document.querySelectorAll('.slot[data-frame]').forEach(slot => {\n    slot.addEventListener('click', (e) => {\n      /* clicks on bullets / inner text also trigger zoom */\n      if(e.target.closest('.more-btn')) return;\n      e.stopPropagation();\n      const id = slot.dataset.frame;\n      if(activeFrame === id) resetView();\n      else activateFrame(id);\n    });\n  });\n  document.querySelectorAll('.details .close').forEach(close => {\n    close.addEventListener('click', (e) => {\n      e.stopPropagation();\n      resetView();\n    });\n    close.addEventListener('mousedown', (e) => e.stopPropagation());\n  });\n  /* keep details clicks from triggering pan */\n  document.querySelectorAll('.details').forEach(d => {\n    d.addEventListener('mousedown', (e) => e.stopPropagation());\n  });\n\n  /* Escape closes */\n  window.addEventListener('keydown', (e) => {\n    if(e.key === 'Escape' && activeFrame) resetView();\n  });\n})();\n\n/* ============================================================\n   Build sun rays (24) and EU stars ring (12) inside the medallion\n   ============================================================ */\n(function(){\n  const raysWrap = document.getElementById('ray-set');\n  const cx = 290, cy = 290, rIn = 230, rOut = 280;\n  // 24 rays alternating long/short\n  for (let i=0; i<24; i++){\n    const a = (i / 24) * Math.PI * 2;\n    const long = i % 2 === 0;\n    const r1 = rIn, r2 = long ? rOut : rIn + 28;\n    const x1 = cx + Math.cos(a) * r1;\n    const y1 = cy + Math.sin(a) * r1;\n    const x2 = cx + Math.cos(a) * r2;\n    const y2 = cy + Math.sin(a) * r2;\n    const el = document.createElementNS('http://www.w3.org/2000/svg','line');\n    el.setAttribute('x1', x1); el.setAttribute('y1', y1);\n    el.setAttribute('x2', x2); el.setAttribute('y2', y2);\n    raysWrap.appendChild(el);\n  }\n  // 12 EU stars\n  const ringWrap = document.getElementById('ring-stars');\n  const RC = 200, RR = 168;\n  const starPath = (cx,cy,size) => {\n    const pts = [];\n    for (let k=0;k<10;k++){\n      const ang = -Math.PI/2 + k * Math.PI/5;\n      const rr = k%2===0 ? size : size*0.42;\n      pts.push((cx + Math.cos(ang)*rr).toFixed(2)+','+(cy + Math.sin(ang)*rr).toFixed(2));\n    }\n    return pts.join(' ');\n  };\n  for (let i=0;i<12;i++){\n    const a = (i/12) * Math.PI*2 - Math.PI/2;\n    const x = RC + Math.cos(a)*RR;\n    const y = RC + Math.sin(a)*RR;\n    const p = document.createElementNS('http://www.w3.org/2000/svg','polygon');\n    p.setAttribute('points', starPath(x, y, 11));\n    ringWrap.appendChild(p);\n  }\n})();\n\n/* ============================================================\n   Auto-print: wait for fonts + a small delay, then open print dialog\n   ============================================================ */\n(async function(){\n  try {\n    if (document.fonts && document.fonts.ready) {\n      await document.fonts.ready;\n    }\n  } catch(e){}\n  await new Promise(r => setTimeout(r, 500));\n  /* auto-print disabled for standalone view */\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
